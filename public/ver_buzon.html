<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Buzón de Sugerencias - ARBOMAP</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="css/sb-admin-2.min.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <script src="js/api-service.js"></script>

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f0f4f8;
        visibility: hidden;
        opacity: 0;
      }
      body.listo {
        visibility: visible;
        opacity: 1;
        transition: opacity 0.1s;
      }
      .topbar-utm {
        background-color: #009688;
      }
      #sidebar-container {
        background-color: #1a252f;
        display: flex;
      }
      .mensaje-texto {
        white-space: pre-wrap;
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body id="page-top">
    <div id="wrapper">
      <div id="sidebar-container"></div>

      <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
          <nav
            class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm"
          >
            <button
              id="sidebarToggleTop"
              class="btn btn-link d-md-none rounded-circle mr-3"
            >
              <i class="fa fa-bars text-white"></i>
            </button>
            <h1
              class="h4 mb-0 text-white font-weight-bold animate__animated animate__fadeInDown"
            >
              <i class="fas fa-envelope-open-text mr-2"></i>Bandeja de Entrada
            </h1>
          </nav>

          <div class="container-fluid">
            <div
              class="card shadow-sm border-0 animate__animated animate__fadeInUp"
              style="border-radius: 12px"
            >
              <div
                class="card-header bg-white py-3 border-bottom-0 d-flex justify-content-between align-items-center"
              >
                <h6 class="m-0 font-weight-bold text-success" id="titulo-buzon">
                  Mensajes Recibidos (0)
                </h6>
                <button
                  class="btn btn-sm btn-outline-success rounded-pill"
                  onclick="cargarBuzon()"
                >
                  <i class="fas fa-sync-alt mr-1"></i> Actualizar
                </button>
              </div>
              <div class="card-body p-0">
                <div class="table-responsive">
                  <table class="table table-hover mb-0">
                    <thead
                      class="bg-light text-uppercase text-muted small font-weight-bold"
                    >
                      <tr>
                        <th class="pl-4 py-3 border-0">Remitente</th>
                        <th class="py-3 border-0">Contacto</th>
                        <th class="py-3 border-0">Fecha</th>
                        <th class="py-3 border-0">Mensaje</th>
                        <th class="py-3 text-center border-0">Acción</th>
                      </tr>
                    </thead>
                    <tbody id="tbody-buzon">
                      <tr>
                        <td colspan="4" class="text-center py-5">
                          <i
                            class="fas fa-spinner fa-spin fa-2x text-muted"
                          ></i>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/buzon-logic.js"></script>
  </body>
</html>
