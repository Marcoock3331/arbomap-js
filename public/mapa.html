<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Explorador del Campus - ARBOMAP</title>
    
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    
    <script src="js/api-service.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fc; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s ease-out; }
        .topbar-utm { background-color: #009688; }
        .info-card { transition: all 0.3s ease; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        
        /* Efecto de brillo para árboles dorados (apadrinados) */
        .tree-gold { filter: drop-shadow(0px 0px 4px rgba(212, 175, 55, 0.8)); }
        .tree-green { filter: drop-shadow(0px 0px 3px rgba(46, 125, 50, 0.6)); }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h4 mb-0 text-white font-weight-bold animate__animated animate__fadeInDown">Mapa Interactivo (UTM)</h1>
                </nav>

                <div class="container-fluid">
                    
                    <div class="row mb-3 animate__animated animate__fadeInDown" style="animation-duration: 0.5s;">
                        <div class="col-12">
                            <div class="d-flex justify-content-center flex-wrap gap-3" id="stats-banner">
                                <span class="badge badge-light border px-4 py-2 text-muted shadow-sm mx-2" style="font-size: 1rem;"><i class="fas fa-tree mr-2"></i>Total: <span id="stat-total">0</span></span>
                                <span class="badge badge-warning px-4 py-2 text-dark shadow-sm mx-2" style="font-size: 1rem;"><i class="fas fa-medal mr-2"></i>Apadrinados: <span id="stat-ocupados">0</span></span>
                                <span class="badge badge-success px-4 py-2 text-white shadow-sm mx-2" style="font-size: 1rem;"><i class="fas fa-hand-holding-heart mr-2"></i>Disponibles: <span id="stat-libres">0</span></span>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-xl-8 col-lg-7">
                            <div class="card shadow-sm border-0 mb-4 animate__animated animate__fadeInLeft" style="border-radius: 10px; overflow: hidden; animation-duration: 0.8s;">
                                <div class="card-body p-1">
                                    <div id="map" style="height: 70vh; width: 100%; z-index: 1;"></div>
                                </div>
                            </div>
                        </div>

                        <div class="col-xl-4 col-lg-5">
                            <div class="card shadow-sm border-0 mb-4 info-card animate__animated animate__fadeInRight" style="border-radius: 10px; height: 70vh; overflow-y: auto; animation-duration: 0.8s;">
                                <div class="card-body p-4" id="info-panel">
                                    <div class="d-flex flex-column justify-content-center align-items-center text-center h-100 p-3">
                                        <i class="fas fa-search-location mb-4" style="font-size: 5rem; color: #009688;"></i>
                                        <h4 class="font-weight-bold text-dark mb-3" style="color: #009688 !important;">Explora la UTM</h4>
                                        <p class="text-muted" style="font-size: 1.1rem;">Haz clic en un árbol en el mapa para ver sus detalles o apadrinarlo.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/mapa-logic.js"></script>
</body>
</html>
