<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Gestión de Reforestación - ARBOMAP UTM</title>
    
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    
    <script src="js/api-service.js"></script>

    <style>
        body { font-family: "Inter", sans-serif; background-color: #f8f9fc; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s; }
        .topbar-utm { background-color: #009688; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        .card-campana { border-radius: 12px; border: none; border-left: 5px solid #009688; transition: 0.3s; }
        .progress { height: 10px; border-radius: 5px; background-color: #eaecf4; }
        .btn-success-utm { background-color: #009688; border: none; }
        .btn-success-utm:hover { background-color: #00796b; }
        .text-utm { color: #009688 !important; }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h4 mb-0 text-white font-weight-bold">Gestión de Reforestación</h1>
                </nav>

                <div class="container-fluid">
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h2 class="h5 mb-0 text-gray-800 font-weight-bold">Campañas y Propuestas</h2>
                        <button class="btn btn-success-utm rounded-pill px-4 shadow-sm text-white font-weight-bold" data-toggle="modal" data-target="#modalPropuesta">
                            <i class="fas fa-plus mr-1"></i> Nueva Propuesta
                        </button>
                    </div>

                    <div class="card shadow-sm mb-4" style="border-radius: 12px; border: none;">
                        <div class="card-body p-0">
                            <div class="d-flex align-items-center justify-content-between px-4 py-3 border-bottom">
                                <h6 class="m-0 font-weight-bold text-utm">
                                    <i class="fas fa-list mr-2"></i>Listado de Campañas
                                </h6>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">ID</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Campaña</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Zona / Sitio</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Progreso</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Estado</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="contenedor-campanas">
                                        <tr>
                                            <td colspan="6" class="text-center py-4">
                                                <i class="fas fa-spinner fa-spin fa-2x text-muted"></i>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPropuesta" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px; overflow: hidden;">
                
                <div class="modal-header text-white border-0 py-3" style="background-color: #009688;">
                    <h5 class="modal-title font-weight-bold" style="font-size: 1.25rem;">
                        <i class="fas fa-seedling mr-2"></i> Proponer Reforestación
                    </h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Cerrar" style="opacity: 0.8;">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <form id="formPropuesta">
                    <div class="modal-body p-4 bg-white">
                        
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-gray-700 small text-uppercase mb-2">Nombre de la Propuesta</label>
                            <div class="input-group input-group-lg shadow-sm">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-light border-right-0" style="border-color: #e3e6f0;">
                                        <i class="fas fa-file-signature text-success"></i>
                                    </span>
                                </div>
                                <input type="text" name="nombre_propuesta" class="form-control border-left-0 pl-0" placeholder="Ej. Campaña Primavera 2026" style="border-color: #e3e6f0; background-color: #f8f9fc;" required>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="font-weight-bold text-gray-700 small text-uppercase mb-2">Cantidad de Árboles (Meta)</label>
                            <div class="input-group input-group-lg shadow-sm">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-light border-right-0" style="border-color: #e3e6f0;">
                                        <i class="fas fa-tree text-success"></i>
                                    </span>
                                </div>
                                <input type="number" name="cantidad_meta" class="form-control border-left-0 pl-0" placeholder="Ej. 50" min="1" style="border-color: #e3e6f0; background-color: #f8f9fc;" required>
                            </div>
                        </div>

                    </div>

                    <div class="modal-footer border-top-0 bg-light justify-content-between py-3 px-4">
                        <button type="button" class="btn btn-outline-secondary font-weight-bold rounded-pill px-4" data-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success font-weight-bold rounded-pill px-4 shadow-sm" style="background-color: #009688; border-color: #009688;">
                            <i class="fas fa-paper-plane mr-2"></i> Enviar Propuesta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAprobar" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-primary text-white" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold">Aprobar y Activar Campaña</h5>
                </div>
                <form id="formAprobar">
                    <input type="hidden" name="id_propuesta" id="aprobar-id">
                    <input type="hidden" name="cantidad_esperada" id="aprobar-meta">
                    <div class="modal-body p-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Asignar Zona / Sitio</label>
                            <select name="id_sitio" id="select-sitios" class="form-control rounded-pill" required></select>
                        </div>
                        <div class="form-group">
                            <label class="small font-weight-bold">Fecha Programada</label>
                            <input type="date" name="fecha_evento" class="form-control rounded-pill" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 d-flex justify-content-center pb-4">
                        <button type="submit" class="btn btn-primary rounded-pill px-5 font-weight-bold shadow-sm">Activar Campaña</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarCampana" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-warning text-dark" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-edit mr-2"></i>Editar Campaña</h5>
                    <button type="button" class="close text-dark" data-dismiss="modal">&times;</button>
                </div>
                <form id="formEditarCampana">
                    <input type="hidden" id="edit-id">
                    <div class="modal-body p-4">
                        <div class="form-group">
                            <label class="small font-weight-bold text-gray-700">Nombre de la Campaña</label>
                            <input type="text" name="nombre_propuesta" id="edit-nombre" class="form-control rounded-pill bg-light border-0" required>
                        </div>
                        <div class="form-group">
                            <label class="small font-weight-bold text-gray-700">Meta de Árboles</label>
                            <input type="number" name="cantidad_meta" id="edit-meta" class="form-control rounded-pill bg-light border-0" required>
                        </div>
                        <div class="form-group">
                            <label class="small font-weight-bold text-gray-700">Zona</label>
                            <select name="id_sitio" id="edit-sitio" class="form-control rounded-pill bg-light border-0" required></select>
                        </div>
                        <div class="form-group">
                            <label class="small font-weight-bold text-gray-700">Fecha</label>
                            <input type="date" name="fecha_evento" id="edit-fecha" class="form-control rounded-pill bg-light border-0">
                        </div>
                    </div>
                    <div class="modal-footer border-0 d-flex justify-content-center pb-4">
                        <button type="submit" class="btn btn-warning font-weight-bold text-dark rounded-pill px-5 shadow-sm">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/reforestacion-logic.js"></script>
</body>
</html>
