<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Gestión de Reforestación - ARBOMAP UTM</title>
    
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <script src="js/api-service.js"></script>

    <style>
        body { font-family: "Inter", sans-serif; background-color: #f8f9fc; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s; }
        .topbar-utm { background-color: #009688; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        .progress { height: 10px; border-radius: 5px; background-color: #eaecf4; }
        .btn-success-utm { background-color: #009688; border: none; color: white; }
        .btn-success-utm:hover { background-color: #00796b; color: white;}
        .text-utm { color: #009688 !important; }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h4 mb-0 text-white font-weight-bold">Gestión de Reforestación</h1>
                </nav>

                <div class="container-fluid">
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h2 class="h5 mb-0 text-gray-800 font-weight-bold">Campañas y Eventos</h2>
                        <button class="btn btn-success-utm rounded-pill px-4 shadow-sm font-weight-bold" data-toggle="modal" data-target="#modalPropuesta">
                            <i class="fas fa-plus mr-1"></i> Nueva Propuesta
                        </button>
                    </div>

                    <div class="card shadow-sm mb-4 border-0" style="border-radius: 12px;">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Campaña</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Logística</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Progreso / Cupo</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0">Estado</th>
                                            <th class="small text-uppercase text-muted font-weight-bold border-0 text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="contenedor-campanas">
                                        <tr><td colspan="5" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-muted"></i></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPropuesta" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header text-white border-0 py-3" style="background-color: #009688;">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-seedling mr-2"></i> Proponer Reforestación</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <form id="formPropuesta">
                    <div class="modal-body p-4 bg-white">
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-gray-700 small text-uppercase mb-2">Nombre de la Propuesta</label>
                            <input type="text" name="nombre_propuesta" class="form-control" placeholder="Ej. Campaña Primavera 2026" required>
                        </div>
                        <div class="form-group mb-3">
                            <label class="font-weight-bold text-gray-700 small text-uppercase mb-2">Meta de Árboles</label>
                            <input type="number" name="cantidad_meta" class="form-control" placeholder="Ej. 50" min="1" required>
                        </div>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="submit" class="btn btn-success-utm font-weight-bold rounded-pill px-4">Enviar Propuesta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAprobar" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-primary text-white" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold">Organizar Logística del Evento</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <form id="formAprobar">
                    <input type="hidden" name="id_propuesta" id="aprobar-id">
                    <input type="hidden" name="cantidad_esperada" id="aprobar-meta">
                    <div class="modal-body p-4">
                        <div class="form-group">
                            <label class="small font-weight-bold">Asignar Zona de Plantación</label>
                            <select name="id_sitio" id="select-sitios" class="form-control rounded-pill" required></select>
                        </div>
                        <div class="row">
                            <div class="col-6 form-group">
                                <label class="small font-weight-bold">Fecha del Evento</label>
                                <input type="date" name="fecha_evento" class="form-control rounded-pill" required>
                            </div>
                            <div class="col-6 form-group">
                                <label class="small font-weight-bold">Cupo Máximo</label>
                                <input type="number" name="cupo_maximo" class="form-control rounded-pill" value="20" min="1" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="small font-weight-bold">Punto de Reunión</label>
                            <input type="text" name="punto_reunion" class="form-control rounded-pill" placeholder="Ej. Explanada Edificio A" required>
                        </div>
                    </div>
                    <div class="modal-footer border-0 d-flex justify-content-center pb-4">
                        <button type="submit" class="btn btn-primary rounded-pill px-5 font-weight-bold shadow-sm">Activar Campaña</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAsistencia" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered modal-lg" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-info text-white" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-clipboard-list mr-2"></i> Pase de Lista Voluntarios</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="pl-4">Matrícula</th>
                                <th>Nombre Completo</th>
                                <th class="text-center">Asistió</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-asistencia">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarCampana" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-warning text-dark"><h5 class="modal-title font-weight-bold">Editar Campaña</h5></div>
                <form id="formEditarCampana">
                    <input type="hidden" id="edit-id">
                    <div class="modal-body p-4">
                        <div class="form-group"><label class="small font-weight-bold">Nombre</label><input type="text" name="nombre_propuesta" id="edit-nombre" class="form-control" required></div>
                        <div class="form-group"><label class="small font-weight-bold">Meta</label><input type="number" name="cantidad_meta" id="edit-meta" class="form-control" required></div>
                        <div class="form-group"><label class="small font-weight-bold">Zona</label><select name="id_sitio" id="edit-sitio" class="form-control" required></select></div>
                    </div>
                    <div class="modal-footer"><button type="submit" class="btn btn-warning font-weight-bold rounded-pill px-5">Guardar Cambios</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/reforestacion-logic.js"></script>
</body>
</html>
