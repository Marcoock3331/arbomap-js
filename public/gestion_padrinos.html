<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Gestión de Padrinos - ARBOMAP UTM</title>
    
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <script src="js/api-service.js"></script>

    <style>
        body { font-family: "Inter", sans-serif; background-color: #f0f4f8; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s; }
        .topbar-utm { background-color: #009688; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        .text-utm { color: #009688 !important; }
        .btn-utm { background-color: #308A4D; color: white; border: none; }
        .btn-utm:hover { background-color: #246d3b; color: white; }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h4 mb-0 text-white font-weight-bold animate__animated animate__fadeInDown">
                        <i class="fas fa-users mr-2"></i>Gestión de Padrinos
                    </h1>
                </nav>

                <div class="container-fluid">
                    
                    <div class="card shadow-sm mb-4 border-0 animate__animated animate__fadeInUp" style="border-radius: 12px; animation-duration: 0.5s;">
                        <div class="card-body bg-white rounded">
                            <div class="row align-items-end">
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <label class="small font-weight-bold text-muted">Filtrar por Carrera</label>
                                    <select id="filtro-carrera" class="form-control rounded-pill text-gray-700">
                                        <option value="Todas">Todas las Carreras</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-3 mb-md-0">
                                    <label class="small font-weight-bold text-muted">Cuatrimestre</label>
                                    <select id="filtro-cuatrimestre" class="form-control rounded-pill text-gray-700">
                                        <option value="Todos">Todos</option>
                                    </select>
                                </div>
                                <div class="col-md-5 d-flex justify-content-end">
                                    <button class="btn btn-utm rounded-pill px-4 shadow-sm font-weight-bold mr-2" onclick="aplicarFiltros()">
                                        <i class="fas fa-search mr-2"></i>Filtrar
                                    </button>
                                    <button class="btn btn-outline-secondary rounded-pill px-4 font-weight-bold bg-light border-0 shadow-sm" onclick="limpiarFiltros()">
                                        <i class="fas fa-sync-alt mr-2"></i>Limpiar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 animate__animated animate__fadeInUp" style="border-radius: 12px; animation-duration: 0.8s;">
                        <div class="card-header bg-white py-3 border-bottom-0">
                            <h6 class="m-0 font-weight-bold text-utm" id="titulo-resultados">Directorio Estudiantil (0 registros)</h6>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-light text-uppercase text-muted small font-weight-bold">
                                        <tr>
                                            <th class="pl-4 py-3 border-0">Matrícula</th>
                                            <th class="py-3 border-0">Nombre Completo</th>
                                            <th class="py-3 border-0">Carrera / Cuatrimestre</th>
                                            <th class="py-3 text-center border-0">Árboles a Cargo</th>
                                            <th class="py-3 text-center border-0">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbody-padrinos">
                                        <tr><td colspan="5" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-muted"></i></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/padrinos-logic.js"></script>
</body>
</html>
