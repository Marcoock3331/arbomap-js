<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Panel General V2 - ARBOMAP</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/liquid-theme.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* 1. Transición suave para evitar parpadeos al cargar el menú */
        body { 
            opacity: 0; 
            transition: opacity 0.3s ease-in-out; 
            background-color: #1a2e1f; /* Fondo oscuro por si acaso */
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        body.listo { 
            opacity: 1; 
        }

        /* 2. Ajustes del mapa */
        .leaflet-pane img, .leaflet-marker-icon { max-width: none !important; }
        #dashboardMap {
            height: 500px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 1;
        }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">

        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h3 mb-0 text-white font-weight-bold">Resumen del Proyecto</h1>
                </nav>

                <div class="container-fluid">
                    <div class="row">
                        
                        <div class="col-xl-4 col-lg-5">
                            <div class="row">
                                <div class="col-12 mb-4">
                                    <div class="card shadow h-100 py-2" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-left: 5px solid #1cc88a; border-right: none; border-top: none; border-bottom: none;">
                                        <div class="card-body">
                                            <div class="row no-gutters align-items-center">
                                                <div class="col mr-2">
                                                    <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Total Árboles</div>
                                                    <div class="h5 mb-0 font-weight-bold text-white" id="tot-arboles">0</div>
                                                </div>
                                                <div class="col-auto"><i class="fas fa-tree fa-2x text-light" style="opacity: 0.5;"></i></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 mb-4">
                                    <div class="card shadow h-100 py-2" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-left: 5px solid #36b9cc; border-right: none; border-top: none; border-bottom: none;">
                                        <div class="card-body">
                                            <div class="row no-gutters align-items-center">
                                                <div class="col mr-2">
                                                    <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Especies</div>
                                                    <div class="h5 mb-0 font-weight-bold text-white" id="tot-especies">0</div>
                                                </div>
                                                <div class="col-auto"><i class="fas fa-dna fa-2x text-light" style="opacity: 0.5;"></i></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 mb-4">
                                    <div class="card shadow h-100 py-2" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-left: 5px solid #f6c23e; border-right: none; border-top: none; border-bottom: none;">
                                        <div class="card-body">
                                            <div class="row no-gutters align-items-center">
                                                <div class="col mr-2">
                                                    <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">En Buen Estado</div>
                                                    <div class="h5 mb-0 font-weight-bold text-white" id="tot-sanos">0</div>
                                                </div>
                                                <div class="col-auto"><i class="fas fa-heartbeat fa-2x text-light" style="opacity: 0.5;"></i></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card shadow mb-4" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: none;">
                                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between bg-transparent border-bottom-0">
                                    <h6 class="m-0 font-weight-bold text-white"><i class="fas fa-chart-pie mr-2"></i> Estado de Salud Global</h6>
                                </div>
                                <div class="card-body">
                                    <div class="chart-pie pt-4 pb-2" style="height: 250px;">
                                        <canvas id="saludPieChart"></canvas>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-xl-8 col-lg-7">
                            <div class="card shadow mb-4 h-100" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: none;">
                                <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between bg-transparent border-bottom-0">
                                    <h6 class="m-0 font-weight-bold text-white"><i class="fas fa-globe-americas mr-2"></i> Distribución de la UTM</h6>
                                    <a href="mapa.html" class="btn btn-sm btn-light shadow-sm text-success font-weight-bold">
                                        <i class="fas fa-expand-arrows-alt fa-sm mr-1"></i> Pantalla Completa
                                    </a>
                                </div>
                                <div class="card-body d-flex flex-column p-3">
                                    <div id="dashboardMap" style="flex-grow: 1;"></div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/index-logic.js"></script>
</body>
</html>
