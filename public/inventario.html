<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventario - ARBOMAP</title>

    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/liquid-theme.css" rel="stylesheet">
    
    <style>
        .img-arbol-tabla {
            width: 50px; height: 50px; object-fit: cover; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        
        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3"><i class="fa fa-bars text-white"></i></button>
                    <h1 class="h3 mb-0 text-white font-weight-bold">Inventario</h1>
                </nav>

                <div class="container-fluid">
                    
                    <div id="alert-container"></div>

                    <div class="card shadow mb-4">
                        <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);">
                            <h6 class="m-0 font-weight-bold text-success">Listado de Árboles</h6>
                            <button class="btn btn-success rounded-pill px-4 shadow-sm" data-toggle="modal" data-target="#modalNuevoArbol">
                                <i class="fas fa-plus mr-2"></i> Agregar Árbol
                            </button>
                        </div>

                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-hover table-bordered text-white" width="100%" cellspacing="0">
                                    <thead class="thead-light">
                                        <tr>
                                            <th style="width: 50px;">ID</th> 
                                            <th>Foto</th>
                                            <th>Especie / Nombre</th>
                                            <th>Ubicación</th>
                                            <th>Coordenadas</th> 
                                            <th>Estado</th>
                                            <th>Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-arboles">
                                        <tr><td colspan="7" class="text-center">Cargando inventario...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNuevoArbol" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content shadow-lg border-0" style="background-color: #1e293b; color: white;">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title font-weight-bold">Registrar Nuevo Árbol</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                </div>
                
                <form id="formAgregarArbol" enctype="multipart/form-data">
                    <div class="modal-body p-4">
                        <div class="row">
                            <div class="col-md-6 border-right border-secondary">
                                <h6 class="text-success font-weight-bold mb-3"><i class="fas fa-leaf mr-2"></i>Datos de la Especie</h6>
                                
                                <div class="form-group">
                                    <label>Nombre Común (Real)</label>
                                    <input type="text" name="nombre_comun" class="form-control form-control-lg bg-dark text-white border-secondary" required>
                                </div>
                                <div class="form-group">
                                    <label>Nombre Científico (Opcional)</label>
                                    <input type="text" name="nombre_cientifico" class="form-control bg-dark text-white border-secondary">
                                </div>
                                <div class="form-group">
                                    <label>Etiqueta / Código</label>
                                    <input type="text" name="codigo" class="form-control bg-dark text-white border-secondary" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <h6 class="text-info font-weight-bold mb-3"><i class="fas fa-map-marker-alt mr-2"></i>Ubicación y Estado</h6>
                                
                                <div class="form-group">
                                    <label>Zona del Campus</label>
                                    <select name="id_sitio" id="select-sitios" class="form-control bg-dark text-white border-secondary">
                                        <option value="">Cargando zonas...</option>
                                    </select>
                                </div>
                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label class="font-weight-bold">Latitud</label>
                                        <input type="text" name="latitud" class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label class="font-weight-bold">Longitud</label>
                                        <input type="text" name="longitud" class="form-control bg-dark text-white border-secondary" required>
                                    </div>
                                </div>
                                <div class="form-group mt-2">
                                    <label>Estado de Salud Inicial</label>
                                    <select name="estado" class="form-control bg-dark text-white border-secondary">
                                        <option value="Bueno">Sano (Bueno)</option>
                                        <option value="Regular">Regular</option>
                                        <option value="Malo">Enfermo (Malo)</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Foto Inicial</label>
                                    <input type="file" name="foto" class="form-control-file border border-secondary rounded p-2 text-white">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer" style="background-color: #0f172a;">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success px-4">Guardar Árbol</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSeguimiento" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content shadow-lg border-0" style="background-color: #1e293b; color: white;">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="tituloModalSeguimiento">Nueva Foto / Reporte</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                </div>
                
                <form id="formSeguimiento" enctype="multipart/form-data">
                    <div class="modal-body">
                        <input type="hidden" name="id_arbol" id="inputIDArbol">
                        
                        <div class="form-group text-center">
                            <label>Estado Actual</label><br>
                            <div class="btn-group btn-group-toggle" data-toggle="buttons">
                                <label class="btn btn-outline-success active"><input type="radio" name="estado" value="Bueno" checked> Bueno</label>
                                <label class="btn btn-outline-warning"><input type="radio" name="estado" value="Regular"> Regular</label>
                                <label class="btn btn-outline-danger"><input type="radio" name="estado" value="Malo"> Malo</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Foto de Evidencia</label>
                            <input type="file" name="foto" class="form-control-file border border-secondary rounded p-2" required>
                        </div>
                        <div class="form-group">
                            <label>Comentarios</label>
                            <textarea name="comentarios" class="form-control bg-dark text-white border-secondary"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer" style="background-color: #0f172a;">
                        <button type="submit" class="btn btn-info px-4">Guardar Reporte</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    
    <script src="js/inventario-logic.js"></script>

</body>
</html>
