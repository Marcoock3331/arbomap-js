<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Inventario de Árboles - ARBOMAP UTM</title>
    
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <script src="js/api-service.js"></script>

    <style>
        body { font-family: "Inter", sans-serif; background-color: #f8f9fc; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s; }
        .topbar-utm { background-color: #009688; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        .text-utm { color: #009688 !important; }
        .btn-utm { background-color: #009688; color: white; border: none; }
        .btn-utm:hover { background-color: #00796b; color: white; }
        
        .img-arbol-tabla { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; transition: transform 0.2s; }
        .img-arbol-tabla:hover { transform: scale(1.5); box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 10; position: relative;}
        #mapaSeleccion { height: 250px; border-radius: 10px; width: 100%; border: 2px solid #eaecf4; }
        .ocultar-impresion { display: table-cell; }
        
        @media print {
            .ocultar-impresion, .topbar, #sidebar-container, .btn, .modal { display: none !important; }
            #content-wrapper { background-color: white !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .card { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>

<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>

        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <h1 class="h4 mb-0 text-white font-weight-bold animate__animated animate__fadeInDown">Inventario de Árboles (UTM)</h1>
                </nav>

                <div class="container-fluid">
                    <div class="card shadow-sm mb-4 border-0 animate__animated animate__fadeInUp" style="border-radius: 12px; animation-duration: 0.8s;">
                        <div class="card-header bg-white py-4 d-flex justify-content-between align-items-center" style="border-radius: 12px 12px 0 0;">
                            <h5 class="m-0 font-weight-bold text-utm"><i class="fas fa-list-ul mr-2"></i>Listado General</h5>
                            <div>
                                <button class="btn btn-secondary rounded-pill shadow-sm px-4 mr-2 font-weight-bold" onclick="window.print()">
                                    <i class="fas fa-print mr-2"></i>Imprimir Reporte
                                </button>
                                <button class="btn btn-utm rounded-pill shadow-sm px-4 font-weight-bold" data-toggle="modal" data-target="#modalNuevoArbol">
                                    <i class="fas fa-plus mr-2"></i>Agregar Árbol
                                </button>
                            </div>
                        </div>

                        <div class="card-body bg-light border-bottom">
                            <div class="row">
                                <div class="col-md-4 mb-2">
                                    <label class="small font-weight-bold text-muted">Búsqueda Rápida</label>
                                    <input type="text" id="filtro-texto" class="form-control rounded-pill border-0 shadow-sm" placeholder="Especie o Etiqueta UTM...">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="small font-weight-bold text-muted">Filtrar por Zona</label>
                                    <select id="filtro-zona" class="form-control rounded-pill border-0 shadow-sm">
                                        <option value="Todas">Todas las Zonas</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="small font-weight-bold text-muted">Estado de Salud</label>
                                    <select id="filtro-estado" class="form-control rounded-pill border-0 shadow-sm">
                                        <option value="Todos">Todos los Estados</option>
                                        <option value="Bueno">Bueno</option>
                                        <option value="Regular">Regular</option>
                                        <option value="Malo">Malo</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead class="bg-white text-uppercase text-muted small font-weight-bold">
                                        <tr>
                                            <th class="pl-4 py-3">ID</th>
                                            <th class="py-3">Foto</th>
                                            <th class="py-3">Especie / Etiqueta</th>
                                            <th class="py-3">Ubicación</th>
                                            <th class="py-3 text-center">Estado</th>
                                            <th class="py-3 text-center ocultar-impresion">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbody-arboles">
                                        <tr><td colspan="6" class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-muted"></i></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNuevoArbol" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg modal-dialog-centered animate__animated animate__zoomIn" style="animation-duration: 0.3s;" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header text-white" style="background-color: #009688; border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-leaf mr-2"></i>Registrar Nuevo Ejemplar</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <form id="formAgregarArbol" enctype="multipart/form-data">
                    <div class="modal-body bg-light p-4">
                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="font-weight-bold text-gray-800 small"><i class="fas fa-map-marker-alt text-danger mr-1"></i> Ubicación en el Mapa</label>
                                <div id="mapaSeleccion" class="mb-3 shadow-sm"></div>
                                
                                <button type="button" class="btn btn-outline-info btn-block rounded-pill font-weight-bold mb-3 shadow-sm" onclick="obtenerCoordenadasGPS()">
                                    <i class="fas fa-satellite-dish mr-2"></i> Usar mi GPS actual
                                </button>

                                <div class="row">
                                    <div class="col-6">
                                        <label class="small text-muted mb-0">Latitud</label>
                                        <input type="text" id="lat" name="latitud" class="form-control form-control-sm text-center font-weight-bold text-info" placeholder="Ej. 19.726" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="small text-muted mb-0">Longitud</label>
                                        <input type="text" id="lng" name="longitud" class="form-control form-control-sm text-center font-weight-bold text-info" placeholder="Ej. -101.16" required>
                                    </div>
                                </div>
                                <div class="mt-3 text-center p-2 bg-white rounded shadow-sm border">
                                    <small class="text-muted d-block">Zona Detectada (Automática):</small>
                                    <div id="zona-detectada-text" class="font-weight-bold">Esperando ubicación...</div>
                                    <input type="hidden" name="id_sitio" id="id_sitio">
                                </div>
                            </div>
                            
                            <div class="col-md-7">
                                <div class="form-group mb-3">
                                    <label class="font-weight-bold text-gray-800 small">Código de Etiqueta (UTM)</label>
                                    <input type="text" name="codigo_etiqueta" class="form-control form-control-solid rounded-pill" placeholder="Ej. UTM-045" required>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="font-weight-bold text-gray-800 small">Nombre Común</label>
                                    <div class="input-group shadow-sm rounded-pill">
                                        <input type="text" name="nombre_comun" class="form-control border-0 rounded-left-pill bg-white" placeholder="Ej. Pino Michoacano" required>
                                        <div class="input-group-append">
                                            <button type="button" id="btn-autocompletar" class="btn btn-primary rounded-right-pill px-3" title="Buscar Nombre Científico"><i class="fas fa-search"></i></button>
                                        </div>
                                    </div>
                                    <small class="text-muted ml-2">Escribe el nombre y presiona buscar.</small>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="font-weight-bold text-gray-800 small">Nombre Científico</label>
                                    <input type="text" name="nombre_cientifico" class="form-control form-control-solid rounded-pill text-success font-italic" placeholder="Autocompletado...">
                                </div>
                                <div class="form-group mb-3">
                                    <label class="font-weight-bold text-gray-800 small">Descripción Breve</label>
                                    <textarea name="descripcion" class="form-control form-control-solid" rows="2" style="border-radius: 12px;"></textarea>
                                </div>
                                
                                <div class="row">
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-bold text-gray-800 small">Estado de Salud</label>
                                        <select name="estado_salud" class="form-control rounded-pill" required>
                                            <option value="Bueno">Bueno</option>
                                            <option value="Regular">Regular</option>
                                            <option value="Malo">Malo</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 form-group">
                                        <label class="font-weight-bold text-gray-800 small">Campaña de Reforestación</label>
                                        <select name="id_reforestacion" class="form-control rounded-pill border-success text-success font-weight-bold"></select>
                                    </div>
                                </div>
                                
                                <div class="form-group mb-0 mt-2">
                                    <label class="font-weight-bold text-gray-800 small"><i class="fas fa-camera mr-1"></i> Fotografía (Evidencia inicial)</label>
                                    <input type="file" name="foto" class="form-control-file border p-2 rounded bg-white" accept="image/*">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 d-flex justify-content-center bg-light">
                         <button type="button" class="btn btn-secondary rounded-pill px-4 shadow-sm" data-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-utm rounded-pill px-5 font-weight-bold shadow-sm">Registrar Árbol en BD</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarArbol" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-dialog-centered animate__animated animate__zoomIn" style="animation-duration: 0.3s;" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
                <div class="modal-header bg-warning text-dark" style="border-radius: 15px 15px 0 0;">
                    <h5 class="modal-title font-weight-bold"><i class="fas fa-edit mr-2"></i>Editar Datos del Árbol</h5>
                    <button type="button" class="close text-dark" data-dismiss="modal">&times;</button>
                </div>
                <form id="formEditarArbol">
                    <input type="hidden" name="id_arbol" id="edit-id_arbol">
                    <div class="modal-body p-4 bg-light">
                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label class="small font-weight-bold text-gray-700">Código / Etiqueta</label>
                                 <input type="text" name="codigo_etiqueta" id="edit-codigo" class="form-control rounded-pill" required>
                            </div>
                            
                            <div class="col-md-6 form-group">
                                <label class="small font-weight-bold text-gray-700 text-danger">Nuevo Estado de Salud</label>
                                <select name="estado_salud" id="edit-estado" class="form-control rounded-pill border-danger text-danger font-weight-bold">
                                     <option value="">-- No actualizar estado --</option>
                                    <option value="Bueno">Bueno</option>
                                     <option value="Regular">Regular</option>
                                    <option value="Malo">Malo</option>
                                </select>
                             </div>
                            
                            <div class="col-md-6 form-group">
                                <label class="small font-weight-bold text-gray-700">Nombre Común</label>
                                 <input type="text" name="nombre_comun" id="edit-comun" class="form-control rounded-pill" required>
                            </div>
                            <div class="col-md-6 form-group">
                                 <label class="small font-weight-bold text-gray-700">Nombre Científico</label>
                                <input type="text" name="nombre_cientifico" id="edit-cientifico" class="form-control rounded-pill font-italic">
                            </div>
                             <div class="col-md-12 form-group">
                                <label class="small font-weight-bold text-gray-700">Descripción</label>
                                <textarea name="descripcion" id="edit-desc" class="form-control" style="border-radius: 10px;" rows="2"></textarea>
                             </div>
                            <div class="col-md-4 form-group">
                                <label class="small font-weight-bold text-gray-700">Latitud</label>
                                 <input type="text" name="latitud" id="edit-lat" class="form-control form-control-sm text-center" required>
                            </div>
                            <div class="col-md-4 form-group">
                                 <label class="small font-weight-bold text-gray-700">Longitud</label>
                                <input type="text" name="longitud" id="edit-lng" class="form-control form-control-sm text-center" required>
                            </div>
                             <div class="col-md-4 form-group">
                                <label class="small font-weight-bold text-gray-700">ID Zona</label>
                                <input type="number" name="id_sitio" id="edit-sitio" class="form-control form-control-sm text-center" placeholder="Ej: 2">
                             </div>
                        </div>
                    </div>
                    <div class="modal-footer border-0 pb-4 d-flex justify-content-center bg-white">
                         <button type="submit" class="btn btn-warning rounded-pill px-5 font-weight-bold text-dark shadow-sm">
                            Guardar Cambios
                        </button>
                    </div>
                 </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>

    <script src="js/inventario-logic.js"></script>
</body>
</html>
