<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Inventario de arboles (UTM) - ARBOMAP</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" />
    <link href="css/sb-admin-2.min.css" rel="stylesheet" />
    <script src="js/auth-guard.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #f8f9fc; visibility: hidden; opacity: 0; }
        body.listo { visibility: visible; opacity: 1; transition: opacity 0.1s ease-out; }
        .topbar-utm { background-color: #009688; }
        .img-arbol-tabla { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; }
        #sidebar-container { background-color: #1A252F; display: flex; }
        #mapaSeleccion { height: 350px; width: 100%; border-radius: 10px; cursor: crosshair; border: 2px solid #ddd; }
        .table-custom th { border-top: none !important; border-bottom: 2px solid #e3e6f0 !important; color: #6e707e; font-size: 0.85rem; }
        .table-custom td { vertical-align: middle !important; }
        
        /* Ocultar elementos irrelevantes al generar PDF/Impresion */
        @media print {
            #sidebar-container, .topbar, .btn, .ocultar-impresion { display: none !important; }
            body { background-color: white; }
            .card { border: none !important; box-shadow: none !important; }
            .table th:last-child, .table td:last-child { display: none !important; }
        }
    </style>
</head>
<body id="page-top">
    <div id="wrapper">
        <div id="sidebar-container"></div>
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <nav class="navbar navbar-expand topbar mb-4 static-top shadow-sm topbar-utm">
                    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3"><i class="fa fa-bars text-white"></i></button>
                    <h1 class="h4 mb-0 text-white font-weight-bold">Inventario de arboles (UTM)</h1>
                </nav>
                
                <div class="container-fluid">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center border-bottom-0">
                            <h6 class="m-0 font-weight-bold text-info" style="font-size: 1.1rem;"><i class="fas fa-list-ul mr-2"></i>Listado General</h6>
                            <div>
                                <button onclick="window.print()" class="btn btn-secondary rounded-pill px-4 shadow-sm font-weight-bold mr-2"><i class="fas fa-print mr-1"></i> Imprimir Reporte</button>
                                <button class="btn btn-success rounded-pill px-4 shadow-sm font-weight-bold" data-toggle="modal" data-target="#modalNuevoArbol"><i class="fas fa-plus mr-1"></i> Agregar Arbol</button>
                            </div>
                        </div>
                        
                        <div class="card-body pt-0">
                            <div class="row mb-4 bg-light p-3 rounded border mx-0 ocultar-impresion">
                                <div class="col-md-4 mb-2 mb-md-0">
                                    <label class="small font-weight-bold text-muted">Busqueda Rapida</label>
                                    <input type="text" id="filtro-texto" class="form-control bg-white shadow-none" placeholder="Especie o Etiqueta UTM..." />
                                </div>
                                <div class="col-md-4 mb-2 mb-md-0">
                                    <label class="small font-weight-bold text-muted">Filtrar por Zona</label>
                                    <select id="filtro-zona" class="form-control bg-white shadow-none"><option value="Todas">Todas las Zonas</option></select>
                                </div>
                                <div class="col-md-4">
                                    <label class="small font-weight-bold text-muted">Estado de Salud</label>
                                    <select id="filtro-estado" class="form-control bg-white shadow-none">
                                        <option value="Todos">Todos los Estados</option>
                                        <option value="Bueno">Bueno</option>
                                        <option value="Regular">Regular</option>
                                        <option value="Malo">Malo</option>
                                    </select>
                                </div>
                            </div>

                            <div class="table-responsive">
                                <table class="table table-hover table-custom" id="tabla-arboles">
                                    <thead class="bg-white font-weight-bold text-uppercase">
                                        <tr>
                                            <th class="pl-3">ID</th>
                                            <th>Foto</th>
                                            <th>Especie / Etiqueta</th>
                                            <th>Ubicacion</th>
                                            <th>Estado</th>
                                            <th class="text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbody-arboles"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalNuevoArbol" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header text-white" style="background-color: #009688;">
                    <h5 class="modal-title font-weight-bold">Registrar Nuevo Exemplar</h5>
                    <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <form id="formAgregarArbol" enctype="multipart/form-data">
                    <div class="modal-body p-4 bg-light">
                        <div class="row">
                            <div class="col-md-5 border-right pr-4">
                                <h6 class="font-weight-bold text-success mb-3 border-bottom pb-2">Datos de la Especie</h6>
                                <div class="form-group">
                                    <label class="small font-weight-bold">Nombre Comun</label>
                                    <div class="input-group">
                                        <input type="text" name="nombre_comun" class="form-control shadow-none" required />
                                        <div class="input-group-append">
                                            <button type="button" class="btn btn-info" id="btn-autocompletar"><i class="fas fa-search"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group"><label class="small font-weight-bold">Nombre Cientifico</label><input type="text" name="nombre_cientifico" id="input-nombre-cientifico" class="form-control" /></div>
                                <div class="form-group"><label class="small font-weight-bold">Descripcion (Automatica)</label><textarea name="descripcion" class="form-control" rows="3"></textarea></div>
                                <div class="form-group"><label class="small font-weight-bold">Etiqueta / Codigo</label><input type="text" name="codigo_etiqueta" class="form-control" required /></div>
                                <div class="form-group"><label class="small font-weight-bold text-info">Campana de Reforestacion</label><select name="id_reforestacion" class="form-control"><option value="">No (Arbol ya existente)</option></select></div>
                                <div class="form-group"><label class="small font-weight-bold">Estado Inicial</label><select name="estado_salud" class="form-control"><option value="Bueno">Bueno</option><option value="Regular">Regular</option><option value="Malo">Malo</option></select></div>
                                <div class="form-group"><label class="small font-weight-bold">Fotografia Inicial</label><input type="file" name="foto" class="form-control-file border p-2 bg-white rounded" /></div>
                            </div>
                            <div class="col-md-7 pl-4">
                                <h6 class="font-weight-bold text-info mb-3 border-bottom pb-2">Localizacion UTM</h6>
                                <div class="card mb-3 shadow-sm border-left-info"><div class="card-body py-2"><label class="small font-weight-bold text-info mb-1">Zona Detectada:</label><h6 id="zona-detectada-text" class="mb-0 text-muted font-weight-bold">Esperando ubicacion...</h6></div></div>
                                <div class="row mb-2">
                                    <div class="col-6"><label class="small font-weight-bold text-muted">Latitud</label><input type="text" name="latitud" id="lat" class="form-control form-control-sm bg-white" readonly required /></div>
                                    <div class="col-6"><label class="small font-weight-bold text-muted">Longitud</label><input type="text" name="longitud" id="lng" class="form-control form-control-sm bg-white" readonly required /></div>
                                </div>
                                <div id="mapaSeleccion" class="shadow-sm"></div>
                                <input type="hidden" name="id_sitio" id="id_sitio" required />
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer bg-white border-top"><button type="button" class="btn btn-secondary rounded-pill px-4" data-dismiss="modal">Cerrar</button><button type="submit" class="btn btn-success px-5 rounded-pill font-weight-bold shadow-sm">Guardar Arbol</button></div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarArbol" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header text-white bg-warning">
                    <h5 class="modal-title font-weight-bold text-dark">Editar Informacion General</h5>
                    <button type="button" class="close text-dark" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <form id="formEditarArbol">
                    <div class="modal-body p-4 bg-light">
                        <input type="hidden" name="id_arbol" id="edit-id_arbol">
                        <div class="form-group"><label class="small font-weight-bold">Etiqueta / Codigo</label><input type="text" name="codigo_etiqueta" id="edit-codigo" class="form-control" required /></div>
                        <div class="form-group"><label class="small font-weight-bold">Nombre Comun</label><input type="text" name="nombre_comun" id="edit-comun" class="form-control" required /></div>
                        <div class="form-group"><label class="small font-weight-bold">Nombre Cientifico</label><input type="text" name="nombre_cientifico" id="edit-cientifico" class="form-control" /></div>
                        <div class="form-group"><label class="small font-weight-bold">Descripcion</label><textarea name="descripcion" id="edit-desc" class="form-control" rows="2"></textarea></div>
                        <div class="row">
                            <div class="col-6"><label class="small font-weight-bold">Latitud (Manual)</label><input type="text" name="latitud" id="edit-lat" class="form-control" required /></div>
                            <div class="col-6"><label class="small font-weight-bold">Longitud (Manual)</label><input type="text" name="longitud" id="edit-lng" class="form-control" required /></div>
                        </div>
                    </div>
                    <div class="modal-footer bg-white border-top"><button type="button" class="btn btn-secondary rounded-pill px-4" data-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-warning px-5 rounded-pill font-weight-bold text-dark shadow-sm">Actualizar Datos</button></div>
                </form>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="js/inventario-logic.js"></script>
</body>
</html>
